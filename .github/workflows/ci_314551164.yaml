name: CI Pipeline - 314551164

on:
  push:
    branches:
      - '**'

jobs:
  ci:
    name: CI Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Prettier check
        run: npm run format:check

      - name: Run tests (with JUnit reporter)
        run: npx vitest run --reporter=verbose --reporter=junit --outputFile=./test-results/junit.xml

      - name: Display test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Vitest Test Results
          path: test-results/junit.xml
          reporter: java-junit
